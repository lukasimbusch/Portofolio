<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        /* Center the text completely on the screen */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0; /* Light grey background */
            font-family: Arial, sans-serif;
        }

        /* Style the big text */
        .big-text {
            font-size: 10vw; /* Scales with the size of the window */
            font-weight: bold;
            color: #333333; /* Dark grey color */
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="big-text">TEST 1</div>

</body>
</html>
