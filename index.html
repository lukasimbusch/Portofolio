<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LukasImbusch | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    color:white;

    background:
    radial-gradient(circle at top right, #1e3a8a 0%, transparent 30%),
    radial-gradient(circle at bottom left, #2563eb 0%, transparent 35%),
    linear-gradient(135deg, #020617, #0f172a, #172554);
}

/* CENTER */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* GLASS CARD */
.card{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:50px;
    width:90%;
    max-width:850px;
    text-align:center;
    z-index:10;
}

h1{font-size:3.5rem;}
.subtitle{color:#cbd5e1;margin-top:10px;}

.buttons{
    margin-top:40px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

.btn{
    text-decoration:none;
    color:white;
    padding:14px 30px;
    border-radius:50px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    transition:.3s;
}

.btn:hover{
    transform:translateY(-6px) scale(1.05);
    box-shadow:0 0 25px rgba(59,130,246,0.6);
}

/* TRAIN WRAPPER */
#train{
    position:absolute;
    width:90px;
    height:40px;
    z-index:5;
    pointer-events:none;
}

/* PIXEL TRAIN (SVG SCALING) */
.train-svg{
    width:100%;
    height:100%;
    image-rendering:pixelated;
    filter:drop-shadow(0 0 6px rgba(255,0,0,0.4));
}

/* optional glow background */
.glow{
    position:fixed;
    width:500px;
    height:500px;
    background:#3b82f6;
    border-radius:50%;
    filter:blur(180px);
    opacity:.12;
    top:-150px;
    right:-150px;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="hero">

    <!-- PIXEL TRAIN -->
    <div id="train">
        <svg class="train-svg" viewBox="0 0 120 50">

            <!-- locomotive -->
            <rect x="5" y="15" width="35" height="20" fill="#e11d48"/>
            <rect x="10" y="10" width="20" height="10" fill="#991b1b"/>
            <rect x="15" y="18" width="8" height="8" fill="#111827"/>

            <!-- wagon 1 -->
            <rect x="45" y="18" width="30" height="17" fill="#dc2626"/>
            <rect x="50" y="22" width="10" height="10" fill="#111827"/>

            <!-- wagon 2 -->
            <rect x="80" y="18" width="30" height="17" fill="#dc2626"/>
            <rect x="85" y="22" width="10" height="10" fill="#111827"/>

            <!-- wheels -->
            <circle cx="15" cy="38" r="4" fill="#0f172a"/>
            <circle cx="30" cy="38" r="4" fill="#0f172a"/>
            <circle cx="55" cy="38" r="4" fill="#0f172a"/>
            <circle cx="70" cy="38" r="4" fill="#0f172a"/>
            <circle cx="90" cy="38" r="4" fill="#0f172a"/>
            <circle cx="105" cy="38" r="4" fill="#0f172a"/>

        </svg>
    </div>

    <!-- MAIN CARD -->
    <div class="card">

        <h1>Lukas Imbusch</h1>
        <p class="subtitle">Developer • Student • Creator</p>

        <div class="buttons">
            <a class="btn" href="mailto:your@email.com">Email</a>
            <a class="btn" href="https://github.com/yourusername">GitHub</a>
            <a class="btn" href="https://linkedin.com">LinkedIn</a>
            <a class="btn" href="https://youtube.com">YouTube</a>
        </div>

    </div>

</div>

<script>
const train = document.getElementById("train");

let angle = 0;

function animate(){

    angle += 0.012;

    const radiusX = 480;
    const radiusY = 320;

    const x = Math.cos(angle) * radiusX;
    const y = Math.sin(angle) * radiusY;

    train.style.left = `calc(50% + ${x}px)`;
    train.style.top = `calc(50% + ${y}px)`;

    // FIXED forward direction
    const rotation = (angle * 180 / Math.PI) + 90;
    train.style.transform = `rotate(${rotation}deg)`;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
