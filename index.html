<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LukasImbusch | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    color:white;

    background:
    radial-gradient(circle at top right, #1e3a8a 0%, transparent 30%),
    radial-gradient(circle at bottom left, #2563eb 0%, transparent 35%),
    linear-gradient(135deg, #020617, #0f172a, #172554);
}

/* =========================
   PORTFOLIO UI
========================= */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:5;
}

.card{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:50px;
    width:90%;
    max-width:850px;
    text-align:center;
}

h1{font-size:3.5rem;}
.subtitle{color:#cbd5e1;margin-top:10px;}

.buttons{
    margin-top:40px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

.btn{
    text-decoration:none;
    color:white;
    padding:14px 30px;
    border-radius:50px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    transition:.3s;
}

.btn:hover{
    transform:translateY(-6px) scale(1.05);
    box-shadow:0 0 25px rgba(59,130,246,0.6);
}

/* =========================
   TRAIN
========================= */

#train{
    position:fixed;
    width:140px;
    height:60px;
    z-index:20;
    pointer-events:none;
    transform-origin:center;
}

/* pixel train look */
.train-svg{
    width:100%;
    height:100%;
    image-rendering:pixelated;
    filter:drop-shadow(0 0 8px rgba(255,0,0,0.4));
}

/* =========================
   RAILWAY OVERLAY
========================= */

#railway{
    position:fixed;
    inset:0;
    z-index:25; /* ABOVE everything */
    pointer-events:none;
    opacity:0;
    transition:opacity 0.5s ease;
}

#railway.show{
    opacity:1;
}

</style>
</head>

<body>

<!-- RAILWAY LAYER -->
<canvas id="railway"></canvas>

<div class="hero">
    <div class="card">
        <h1>Lukas Imbusch</h1>
        <p class="subtitle">Developer • Student • Creator</p>

        <div class="buttons">
            <a class="btn" href="mailto:your@email.com">Email</a>
            <a class="btn" href="https://github.com/yourusername">GitHub</a>
            <a class="btn" href="https://linkedin.com">LinkedIn</a>
        </div>
    </div>
</div>

<!-- PIXEL TRAIN (REAL SVG) -->
<div id="train">
<svg class="train-svg" viewBox="0 0 160 70">

    <!-- locomotive -->
    <rect x="5" y="25" width="55" height="25" fill="#ef4444"/>
    <rect x="10" y="15" width="25" height="15" fill="#991b1b"/>
    <rect x="20" y="30" width="10" height="10" fill="#0f172a"/>

    <!-- cabin -->
    <rect x="60" y="28" width="40" height="22" fill="#dc2626"/>

    <!-- wagons -->
    <rect x="105" y="28" width="40" height="22" fill="#b91c1c"/>

    <!-- wheels -->
    <circle cx="20" cy="55" r="5" fill="#0f172a"/>
    <circle cx="45" cy="55" r="5" fill="#0f172a"/>
    <circle cx="75" cy="55" r="5" fill="#0f172a"/>
    <circle cx="120" cy="55" r="5" fill="#0f172a"/>
    <circle cx="145" cy="55" r="5" fill="#0f172a"/>

</svg>
</div>

<script>
/* =========================
   RAILWAY GENERATION
========================= */

const canvas = document.getElementById("railway");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* pixel-style track points */
function generateTrack(){
    const points = [];
    const count = 10;

    const cx = window.innerWidth/2;
    const cy = window.innerHeight/2;

    const radius = Math.min(window.innerWidth, window.innerHeight) * 0.38;

    for(let i=0;i<count;i++){
        const angle = (i / count) * Math.PI * 2;

        points.push({
            x: cx + Math.cos(angle)*radius + (Math.random()-0.5)*120,
            y: cy + Math.sin(angle)*radius + (Math.random()-0.5)*120
        });
    }

    return points;
}

const track = generateTrack();

/* draw pixel railway */
function drawRailway(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.lineWidth = 6;
    ctx.strokeStyle = "rgba(255,255,255,0.25)";

    ctx.beginPath();
    ctx.moveTo(track[0].x, track[0].y);

    for(let i=1;i<track.length;i++){
        ctx.lineTo(track[i].x, track[i].y);
    }

    ctx.closePath();
    ctx.stroke();

    /* sleepers (pixel ties) */
    ctx.fillStyle = "rgba(255,255,255,0.15)";

    for(let i=0;i<track.length;i++){
        const p = track[i];
        ctx.fillRect(p.x-6, p.y-6, 12, 12);
    }
}

drawRailway();

/* =========================
   RAILWAY FLASH EFFECT
========================= */

function flashRailway(){
    canvas.classList.add("show");

    setTimeout(()=>{
        canvas.classList.remove("show");
    },2000);
}

setInterval(flashRailway, 5000);
flashRailway();

/* =========================
   TRAIN MOVEMENT
========================= */

const train = document.getElementById("train");

let t = 0;

function lerp(a,b,t){ return a + (b-a)*t; }

function get(i){ return track[i % track.length]; }

function animate(){

    t += 0.0025;

    const seg = Math.floor(t * track.length);
    const local = (t * track.length) % 1;

    const p1 = get(seg);
    const p2 = get(seg+1);

    const x = lerp(p1.x, p2.x, local);
    const y = lerp(p1.y, p2.y, local);

    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;

    const angle = Math.atan2(dy, dx) * 180/Math.PI;

    train.style.left = x + "px";
    train.style.top = y + "px";
    train.style.transform = `rotate(${angle}deg)`;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
