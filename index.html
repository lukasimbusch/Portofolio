<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#020617,#0f172a,#172554);
    font-family:Arial;
    color:white;
}

/* UI */
.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:40px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    backdrop-filter:blur(12px);
    text-align:center;
    z-index:5;
}

/* TRAIN */
#train{
    position:fixed;
    width:140px;
    height:60px;
    z-index:9999;
    pointer-events:none;
    transform-origin:center;
}

svg{
    width:100%;
    height:100%;
    image-rendering:pixelated;
}

/* RAILS */
#rails{
    position:fixed;
    inset:0;
    z-index:20;
    pointer-events:none;
    opacity:0.35;
}
</style>
</head>

<body>

<canvas id="rails"></canvas>

<div class="card">
    <h1>Portfolio</h1>
    <p>Random adaptive railway system</p>
</div>

<div id="train">
<svg viewBox="0 0 160 70">
    <rect x="5" y="25" width="55" height="25" fill="#ef4444"/>
    <rect x="60" y="28" width="40" height="22" fill="#dc2626"/>
    <rect x="105" y="28" width="40" height="22" fill="#b91c1c"/>

    <circle cx="20" cy="55" r="5" fill="#111827"/>
    <circle cx="50" cy="55" r="5" fill="#111827"/>
    <circle cx="85" cy="55" r="5" fill="#111827"/>
    <circle cx="130" cy="55" r="5" fill="#111827"/>
</svg>
</div>

<script>

/* =========================
   RANDOM RAIL SYSTEM (ONCE)
========================= */

const canvas = document.getElementById("rails");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* generate ONE stable rail network */
function makeNodes(){
    const nodes=[];
    const count=14;

    for(let i=0;i<count;i++){
        nodes.push({
            x:Math.random()*innerWidth,
            y:Math.random()*innerHeight
        });
    }
    return nodes;
}

const nodes = makeNodes();

/* connect nodes randomly (graph) */
const edges=[];
for(let i=0;i<nodes.length;i++){
    const a=i;
    const b=Math.floor(Math.random()*nodes.length);
    if(a!==b) edges.push([a,b]);
}

/* draw rails */
function draw(){
    ctx.clearRect(0,0,innerWidth,innerHeight);

    ctx.strokeStyle="rgba(255,255,255,0.2)";
    ctx.lineWidth=3;

    for(const [a,b] of edges){
        ctx.beginPath();
        ctx.moveTo(nodes[a].x,nodes[a].y);
        ctx.lineTo(nodes[b].x,nodes[b].y);
        ctx.stroke();
    }

    requestAnimationFrame(draw);
}
draw();


/* =========================
   TRAIN (SMOOTH RANDOM WALK)
========================= */

const train=document.getElementById("train");

let current = Math.floor(Math.random()*nodes.length);
let target = pickNext(current);

let x=nodes[current].x;
let y=nodes[current].y;

function pickNext(from){
    let options=[];
    for(const [a,b] of edges){
        if(a===from) options.push(b);
        if(b===from) options.push(a);
    }
    if(options.length===0) return Math.floor(Math.random()*nodes.length);
    return options[Math.floor(Math.random()*options.length)];
}

function animate(){

    const tx = nodes[target].x;
    const ty = nodes[target].y;

    const dx = tx - x;
    const dy = ty - y;

    const dist = Math.hypot(dx,dy);

    /* arrive → choose new random path */
    if(dist < 2){
        current = target;
        target = pickNext(current);
    }

    /* smooth movement */
    x += dx * 0.02;
    y += dy * 0.02;

    const angle = Math.atan2(dy,dx) * 180/Math.PI;

    train.style.left = x + "px";
    train.style.top = y + "px";
    train.style.transform = `rotate(${angle}deg)`;

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
