<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lukas Imbusch | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    color:white;
    overflow-x:hidden;
    background:linear-gradient(
        -45deg,
        #0f172a,
        #1e293b,
        #2563eb,
        #7c3aed
    );
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.card{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:50px;
    width:90%;
    max-width:850px;

    animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    margin:auto;
    margin-bottom:25px;
    border:4px solid rgba(255,255,255,0.3);

    background:url("https://via.placeholder.com/300")
    center/cover;

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

h1{
    font-size:4rem;
}

.subtitle{
    color:#d8d8d8;
    margin-top:10px;
    font-size:1.2rem;
}

.buttons{
    margin-top:40px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

.btn{
    position:relative;
    overflow:hidden;

    text-decoration:none;
    color:white;
    padding:15px 35px;
    border-radius:50px;

    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);

    transition:all .35s ease;
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
    );
    transition:.6s;
}

.btn:hover::before{
    left:100%;
}

.btn:hover{
    transform:translateY(-6px) scale(1.07);
    box-shadow:
        0 0 20px rgba(255,255,255,.3),
        0 0 50px rgba(37,99,235,.5);
}

.projects{
    padding:80px 20px;
}

.section-title{
    text-align:center;
    margin-bottom:50px;
    font-size:2.5rem;
}

.project-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    max-width:1200px;
    margin:auto;
}

.project{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:30px;
    transition:.4s;
}

.project:hover{
    transform:
        translateY(-10px)
        rotateX(5deg)
        rotateY(-5deg);

    box-shadow:
        0 20px 40px rgba(0,0,0,.3);
}

.project h3{
    margin-bottom:15px;
}

.project p{
    color:#d9d9d9;
}

.footer{
    text-align:center;
    padding:40px;
    color:#ddd;
}

.glow{
    position:fixed;
    width:500px;
    height:500px;
    background:#3b82f6;
    border-radius:50%;
    filter:blur(180px);
    opacity:.15;
    top:-150px;
    right:-150px;
    pointer-events:none;

    animation:pulse 8s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.3);
    }
}

@media(max-width:768px){
    h1{
        font-size:2.5rem;
    }

    .card{
        padding:35px;
    }
}
</style>
</head>
<body>

<div class="glow"></div>

<section class="hero">
    <div class="card">

        <div class="avatar"></div>

        <h1>Lukas Imbusch</h1>
        <p class="subtitle">
            Web Developer • Student • Creator
        </p>

        <div class="buttons">
            <a href="mailto:your@email.com" class="btn">
                Contact Me
            </a>

            <a href="https://github.com/yourusername"
               target="_blank"
               class="btn">
               GitHub
            </a>

            <a href="https://linkedin.com"
               target="_blank"
               class="btn">
               LinkedIn
            </a>

            <a href="https://youtube.com"
               target="_blank"
               class="btn">
               YouTube
            </a>
        </div>

    </div>
</section>

<section class="projects">

    <h2 class="section-title">Projects</h2>

    <div class="project-grid">

        <div class="project">
            <h3>Portfolio Website</h3>
            <p>
                Modern responsive portfolio with animations.
            </p>
        </div>

        <div class="project">
            <h3>Discord Bot</h3>
            <p>
                Custom bot with commands and automation.
            </p>
        </div>

        <div class="project">
            <h3>Minecraft Project</h3>
            <p>
                Server tools and plugin development.
            </p>
        </div>

    </div>

</section>

<div class="footer">
    © 2026 Lukas Imbusch
</div>

</body>
</html>
