<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LukasImbusch | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    color:white;

    background:
    radial-gradient(circle at top right, #1e3a8a 0%, transparent 30%),
    radial-gradient(circle at bottom left, #2563eb 0%, transparent 35%),
    linear-gradient(135deg, #020617, #0f172a, #172554);
}

/* CENTER CARD */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:5;
}

.card{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:50px;
    width:90%;
    max-width:850px;
    text-align:center;
    z-index:10;
}

h1{font-size:3.5rem;}
.subtitle{color:#cbd5e1;margin-top:10px;}

.buttons{
    margin-top:40px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

.btn{
    text-decoration:none;
    color:white;
    padding:14px 30px;
    border-radius:50px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    transition:.3s;
}

.btn:hover{
    transform:translateY(-6px) scale(1.05);
    box-shadow:0 0 25px rgba(59,130,246,0.6);
}

/* TRACK LAYER */
#track{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
}

/* TRAIN */
#train{
    position:fixed;
    width:90px;
    height:40px;
    z-index:9999;
    pointer-events:none;
    transform-origin:center;
}

/* SVG STYLE */
.train-svg{
    width:100%;
    height:100%;
    image-rendering:pixelated;
    filter:drop-shadow(0 0 6px rgba(255,0,0,0.4));
}
</style>
</head>

<body>

<canvas id="track"></canvas>

<div class="hero">
    <div class="card">
        <h1>Lukas Imbusch</h1>
        <p class="subtitle">Developer • Student • Creator</p>

        <div class="buttons">
            <a class="btn" href="mailto:your@email.com">Email</a>
            <a class="btn" href="https://github.com/yourusername">GitHub</a>
            <a class="btn" href="https://linkedin.com">LinkedIn</a>
            <a class="btn" href="https://youtube.com">YouTube</a>
        </div>
    </div>
</div>

<!-- TRAIN -->
<div id="train">
<svg class="train-svg" viewBox="0 0 120 50">
    <rect x="5" y="15" width="35" height="20" fill="#e11d48"/>
    <rect x="10" y="10" width="20" height="10" fill="#991b1b"/>
    <rect x="45" y="18" width="30" height="17" fill="#dc2626"/>
    <rect x="80" y="18" width="30" height="17" fill="#dc2626"/>

    <circle cx="15" cy="38" r="4" fill="#0f172a"/>
    <circle cx="30" cy="38" r="4" fill="#0f172a"/>
    <circle cx="55" cy="38" r="4" fill="#0f172a"/>
    <circle cx="90" cy="38" r="4" fill="#0f172a"/>
</svg>
</div>

<script>
/* =========================
   RANDOM RAILWAY GENERATOR
========================= */

const canvas = document.getElementById("track");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* create random loop points */
function generateTrack(){
    const points = [];
    const count = 8;

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;

    for(let i=0;i<count;i++){
        const angle = (i / count) * Math.PI * 2;

        const jitterX = (Math.random()-0.5)*200;
        const jitterY = (Math.random()-0.5)*200;

        points.push({
            x: centerX + Math.cos(angle) * radius + jitterX,
            y: centerY + Math.sin(angle) * radius + jitterY
        });
    }

    return points;
}

const track = generateTrack();

/* draw track */
function drawTrack(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(track[0].x, track[0].y);

    for(let i=1;i<track.length;i++){
        ctx.lineTo(track[i].x, track[i].y);
    }

    ctx.closePath();
    ctx.stroke();
}

drawTrack();

/* =========================
   TRAIN MOVEMENT ON TRACK
========================= */

const train = document.getElementById("train");

let t = 0;

function lerp(a,b,t){
    return a + (b-a)*t;
}

function getPoint(i){
    return track[i % track.length];
}

function animate(){

    const speed = 0.0025;
    t += speed;

    const seg = Math.floor(t * track.length);
    const localT = (t * track.length) % 1;

    const p1 = getPoint(seg);
    const p2 = getPoint(seg+1);

    const x = lerp(p1.x, p2.x, localT);
    const y = lerp(p1.y, p2.y, localT);

    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;

    const angle = Math.atan2(dy, dx) * 180 / Math.PI;

    train.style.left = `${x}px`;
    train.style.top = `${y}px`;
    train.style.transform = `rotate(${angle}deg)`;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
