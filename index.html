<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless 3D Connected Train Portfolio</title>
    <style>
        /* --- Core Reset & 3D Stage Setup --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #060814;
            color: #e2e8f0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px; 
        }

        /* --- Master 3D Viewport Matrix --- */
        .scene3d {
            position: relative;
            width: 800px;
            height: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transform: rotateX(60deg) rotateZ(-40deg);
        }

        /* --- THE 3D RAILWAY TRACK SYSTEM --- */
        .railway-system {
            position: absolute;
            width: 600px;
            height: 600px;
            transform-style: preserve-3d;
        }

        .track-ballast {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 55%, #161e2e 56%, #0f172a 70%, transparent 71%);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.7);
        }

        .track-ties {
            position: absolute;
            inset: 20px;
            border-radius: 50%;
            background: repeating-conic-gradient(
                from 0deg,
                #3b4252 0deg 1.2deg,
                transparent 1.2deg 5deg
            );
            -webkit-mask: radial-gradient(circle, transparent 61%, black 62%, black 89%, transparent 90%);
            mask: radial-gradient(circle, transparent 61%, black 62%, black 89%, transparent 90%);
            transform: translateZ(2px);
        }

        .rail {
            position: absolute;
            border-radius: 50%;
            border: 3px solid #00f2fe;
            box-shadow: 0 0 15px #00f2fe, inset 0 0 15px #00f2fe;
            transform: translateZ(8px);
        }
        .rail.outer { inset: 48px; }
        .rail.inner { inset: 72px; }


        /* --- CENTRAL FLOATING PORTFOLIO CARD (SHIFTED SLIGHTLY MORE TO THE FRONT) --- */
        .card-wrapper {
            position: absolute;
            width: 340px;
            height: 440px;
            transform-style: preserve-3d;
            /* Updated translateY to -170px to pull the layout slightly more forward */
            transform: rotateZ(40deg) rotateX(-60deg) translateZ(40px) translateY(-170px);
            animation: cardFloat 5s ease-in-out infinite alternate;
            z-index: 100;
        }

        @keyframes cardFloat {
            0% { transform: rotateZ(40deg) rotateX(-60deg) translateZ(45px) translateY(-170px); }
            100% { transform: rotateZ(40deg) rotateX(-60deg) translateZ(75px) translateY(-180px); }
        }

        .portfolio-card {
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 24px;
            padding: 35px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 40px 70px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
        }

        .card-content h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(45px);
        }

        .card-content h2 {
            font-size: 0.95rem;
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
            transform: translateZ(35px);
        }

        .card-content p {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-top: 30px;
            transform: translateZ(25px);
        }

        /* --- Interactive Skills Matrix --- */
        .skills-matrix {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 25px;
            transform: translateZ(30px);
        }

        .skill-btn {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.2);
            color: #e2e8f0;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .skill-btn:hover {
            background: rgba(0, 242, 254, 0.15);
            border-color: #00f2fe;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.4);
            transform: scale(1.04);
        }

        .skill-btn.github {
            border-color: rgba(46, 164, 79, 0.4);
            color: #48ca64;
        }
        
        .skill-btn.github:hover {
            background: rgba(46, 164, 79, 0.2);
            border-color: #2ea44f;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(46, 164, 79, 0.5);
        }

        /* --- Main Action Button --- */
        .cta-action {
            display: block;
            text-align: center;
            text-decoration: none;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #05070f;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 16px;
            border-radius: 12px;
            transform: translateZ(40px);
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4);
            transition: all 0.3s ease;
        }

        .cta-action:hover {
            transform: translateZ(45px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.6);
            filter: brightness(1.1);
        }


        /* =========================================================
           === SEAMLESSLY CONNECTED 3D CONVOY SYSTEM ===
           ========================================================= */
        
        .orbit-pivot {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: trainRotateLoop 12s linear infinite;
        }

        .pivot-engine { animation-delay: 0s; }
        .pivot-car1   { animation-delay: -11.522s; } 
        .pivot-car2   { animation-delay: -11.044s; } 

        @keyframes trainRotateLoop {
            from { transform: rotateZ(0deg); }
            to { transform: rotateZ(-360deg); }
        }

        .train-car-3d {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 60px;
            height: 24px;
            transform: translateY(-240px) translateZ(10px); 
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            left: 50%;
            top: 50%;
            box-sizing: border-box;
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        .face-top    { width: 60px; height: 24px; margin-left: -30px; margin-top: -12px; transform: translateZ(11px); }
        .face-bottom { width: 60px; height: 24px; margin-left: -30px; margin-top: -12px; transform: translateZ(-11px); }
        .face-left   { width: 60px; height: 22px; margin-left: -30px; margin-top: -11px; transform: translateY(-12px) rotateX(90deg); }
        .face-right  { width: 60px; height: 22px; margin-left: -30px; margin-top: -11px; transform: translateY(12px) rotateX(90deg); }
        .face-front  { width: 24px; height: 22px; margin-left: -12px; margin-top: -11px; transform: translateX(30px) rotateY(90deg); }
        .face-back   { width: 24px; height: 22px; margin-left: -12px; margin-top: -11px; transform: translateX(-30px) rotateY(90deg); }

        .gangway-bellows {
            position: absolute;
            left: 50%; top: 50%;
            width: 14px;
            height: 20px;
            margin-left: 28px; 
            margin-top: -10px;
            transform-style: preserve-3d;
        }
        .g-face {
            position: absolute;
            background: #11141a;
            border: 1px solid #1f2330;
        }
        .g-top    { width: 14px; height: 20px; transform: translateZ(9px); }
        .g-bottom { width: 14px; height: 20px; transform: translateZ(-9px); }
        .g-left   { width: 14px; height: 18px; transform: translateY(-10px) rotateX(90deg); }
        .g-right  { width: 14px; height: 18px; transform: translateY(10px) rotateX(90deg); }

        .locomotive .face-top { background: #3b4252; }
        .locomotive .face-left, .locomotive .face-right { background: #1e2530; }
        
        .locomotive .face-back { 
            background: #ffffff; 
            box-shadow: 0 0 25px 5px #00f2fe;
            border: 1px solid #fff;
        }
        .locomotive .face-front { background: #0b0f19; }

        .cabin-block {
            position: absolute;
            width: 25px;
            height: 24px;
            left: 0;
            top: 0;
            transform-style: preserve-3d;
            transform: translateZ(11px);
        }
        .cabin-face {
            position: absolute;
            left: 50%; top: 50%;
            background: #2e3440;
            border: 1px solid rgba(0, 242, 254, 0.4);
        }
        .cab-top   { width: 25px; height: 24px; margin-left: -12.5px; margin-top: -12px; background: #434c5e; transform: translateZ(12px); }
        .cab-left  { width: 25px; height: 12px; margin-left: -12.5px; margin-top: -6px; transform: translateY(-12px) rotateX(90deg) translateZ(6px); }
        .cab-right { width: 25px; height: 12px; margin-left: -12.5px; margin-top: -6px; transform: translateY(12px) rotateX(90deg) translateZ(-6px); }
        .cab-back  { width: 24px; height: 12px; margin-left: -12px; margin-top: -6px; background: #00f2fe; transform: translateX(-12.5px) rotateY(90deg); opacity: 0.8; }
        .cab-front { width: 24px; height: 12px; margin-left: -12px; margin-top: -6px; transform: translateX(12.5px) rotateY(90deg); }

        .passenger-car .face-top { background: #2e3440; }
        .passenger-car .face-front, .passenger-car .face-back { background: #1a1f29; }
        .passenger-car .face-left, .passenger-car .face-right {
            background: linear-gradient(90deg, 
                #1a1f29 12%, #00f2fe 18%, #00f2fe 38%, 
                #1a1f29 44%, #00f2fe 50%, #00f2fe 70%, 
                #1a1f29 76%, #00f2fe 82%, #00f2fe 94%, #1a1f29 100%);
        }

        .ambient-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.05) 0%, transparent 70%);
            transform: translateZ(-5px);
            pointer-events: none;
        }
    </style>
</head>

    <style>
        /* CSS for the new digital matrix lines */
        .matrix-line {
            position: absolute;
            width: 2px;
            height: 150px;
            top: -200px;
            background: linear-gradient(to bottom, transparent, var(--line-color));
            opacity: 0;
            transform-style: preserve-3d;
            animation: matrixFall var(--fall-duration) linear infinite, pulseGlow 2s ease-in-out infinite alternate;
            animation-delay: var(--fall-delay);
        }

        @keyframes matrixFall {
            0% {
                transform: translateY(0) translateZ(var(--z-pos));
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(900px) translateZ(var(--z-pos));
                opacity: 0;
            }
        }

        @keyframes pulseGlow {
            0% { filter: brightness(1) drop-shadow(0 0 2px var(--line-color)); }
            100% { filter: brightness(1.8) drop-shadow(0 0 12px var(--line-color)); }
        }
    </style>

    <style>
        /* CSS for the hacker-styled data streams traveling front-to-back */
        .matrix-line {
            position: absolute;
            /* Ultra-thin data lines for a digital laser appearance */
            width: 1px;
            height: 180px; 
            left: calc(50% + var(--x-pos));
            top: 50%;
            background: linear-gradient(to bottom, transparent, var(--line-color));
            opacity: 0;
            transform-style: preserve-3d;
            animation: matrixDepth var(--travel-duration) linear infinite, laserGlow 1s ease-in-out infinite alternate;
            animation-delay: var(--travel-delay);
        }

        @keyframes matrixDepth {
            0% {
                transform: translateZ(var(--z-pos)) translateY(-700px) rotateX(90deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% {
                transform: translateZ(var(--z-pos)) translateY(700px) rotateX(90deg);
                opacity: 0;
            }
        }

        @keyframes laserGlow {
            0% { filter: brightness(1.2) drop-shadow(0 0 1px var(--line-color)); }
            100% { filter: brightness(2.5) drop-shadow(0 0 8px var(--line-color)); }
        }
    </style>

    <style>
        /* --- Hacker Dynamic Running Code Streams --- */
        .matrix-line {
            position: absolute;
            left: calc(50% + var(--x-pos));
            /* Start positioned above the viewpoint boundary */
            top: -200px;
            color: var(--line-color);
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            font-size: var(--font-size);
            white-space: nowrap;
            letter-spacing: 2px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            opacity: 0;
            transform-style: preserve-3d;
            /* Anchors them at a fixed 3D depth layer while executing the vertical drop */
            animation: matrixFall var(--travel-duration) linear infinite, terminalGlow 1s ease-in-out infinite alternate;
            animation-delay: var(--travel-delay);
            z-index: 1;
        }

        @keyframes matrixFall {
            0% {
                transform: translateZ(var(--z-pos)) translateY(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                /* Cascades straight down past the viewport baseline */
                transform: translateZ(var(--z-pos)) translateY(1200px);
                opacity: 0;
            }
        }

        @keyframes terminalGlow {
            0% { 
                filter: brightness(1.2) drop-shadow(0 0 2px var(--line-color)); 
                text-shadow: 0 0 4px var(--line-color);
            }
            100% { 
                filter: brightness(2.5) drop-shadow(0 0 8px var(--line-color));
                text-shadow: 0 0 10px var(--line-color), 0 0 16px var(--line-color);
            }
        }

        }

        .portfolio-card.hacker-mode h2 {

        }

        .portfolio-card.hacker-mode p {

            font-family: 'Courier New', Courier, monospace;

        .portfolio-card.hacker-mode .skill-btn {
            background: rgba(0, 20, 5, 0.6) !important;
            border: 1px solid #00ff66 !important;
            color: #00ff66 !important;
            font-family: 'Courier New', Courier, monospace;
        }

        .portfolio-card.hacker-mode .skill-btn:hover {
            background: #00ff66 !important;
            color: #000000 !important;
            box-shadow: 0 0 15px #00ff66 !important;
        }

        .portfolio-card.hacker-mode .cta-action {
            background: #00ff66 !important;
            color: #000000 !important;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.5) !important;
        }
    </style>

    <script>
        let activeIntervals = [];

        document.querySelector('.cta-action').addEventListener('click', function(e) {
            e.preventDefault(); 
            
            const scene = document.querySelector('.scene3d');
            const card = document.querySelector('.portfolio-card');
            const btn = this;
            
            if (!scene || !card) return;

            if (card.classList.contains('hacker-mode')) {
                // ==========================================
                // --- RETURN TO NORMAL MODE ---
                // ==========================================
                document.querySelectorAll('.matrix-line').forEach(line => line.remove());
                activeIntervals.forEach(id => clearInterval(id));
                activeIntervals = [];

                card.classList.remove('hacker-mode');
                btn.innerText = "CONNECT TO MATRIX";

                document.querySelectorAll('.railway-system, .orbit-pivot, .ambient-glow').forEach(el => {
                    el.style.display = '';
                });

            } else {
                // ==========================================
                // --- ENTER HACKER MODE ---
                // ==========================================
                document.querySelectorAll('.railway-system, .orbit-pivot, .ambient-glow').forEach(el => {
                    el.style.display = 'none';
                });

                card.classList.add('hacker-mode');
                btn.innerText = "DISCONNECT_FROM_MATRIX";

                const totalLines = 100; 
                const colors = ['#00ff66', '#33ff99', '#00ffcc'];
                const cyberPool = [
                    '01101001', '10011100', 'SYS_INIT_RUN', 'OVERRIDE_AUTH', 'FETCH_SECURE_CORE', 
                    'BYPASS_FIREWALL', '001101', '111011', 'NET_ROOT_ACCESS', 'DECRYPT_STAGE_2'
                ];

                for (let i = 0; i < totalLines; i++) {
                    const line = document.createElement('div');
                    line.className = 'matrix-line';
                    
                    line.innerText = cyberPool[Math.floor(Math.random() * cyberPool.length)];
                    
                    // X dispersion across coordinates, Z controls depth distance layers
                    const randomX = Math.floor(Math.random() * 1600) - 800; 
                    const randomZ = Math.floor(Math.random() * 600) - 300;  
                    const duration = (Math.random() * 1.5 + 1.5).toFixed(2) + 's'; // Measured fall velocity
                    const delay = (Math.random() * -4).toFixed(2) + 's';   
                    const size = (Math.random() * 5 + 11) + 'px'; 
                    const color = colors[Math.floor(Math.random() * colors.length)];

                    line.style.setProperty('--x-pos', `${randomX}px`);
                    line.style.setProperty('--z-pos', `${randomZ}px`);
                    line.style.setProperty('--travel-duration', duration);
                    line.style.setProperty('--travel-delay', delay);
                    line.style.setProperty('--font-size', size);
                    line.style.setProperty('--line-color', color);

                    scene.appendChild(line);

                    const intervalId = setInterval(() => {
                        if (Math.random() > 0.4) {
                            line.innerText = cyberPool[Math.floor(Math.random() * cyberPool.length)];
                        }
                    }, Math.random() * 400 + 200);
                    
                    activeIntervals.push(intervalId);
                }
            }
        });
    </script>
</body>
</html>
